<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/sai.jpeg" type="image/jpeg" />
    <link rel="apple-touch-icon" href="/sai.jpeg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="theme-color"
      content="#f6f1e6"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#191919"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="Sai Charan S — Software Developer portfolio"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sai Charan S" />
    <meta
      property="og:description"
      content="Sai Charan S — Software Developer portfolio"
    />
    <meta property="og:image" content="/sai.jpeg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Sai Charan S" />
    <meta
      name="twitter:description"
      content="Sai Charan S — Software Developer portfolio"
    />
    <meta name="twitter:image" content="/sai.jpeg" />
    <title>Sai Charan S</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload the LCP image at the smallest size the mobile viewport
         will pick; modern browsers will then also preload the others via
         the `<link rel="preload" imagesrcset>`. -->
    <link
      rel="preload"
      as="image"
      href="/Sai_banner-768w.avif"
      imagesrcset="/Sai_banner-768w.avif 768w, /Sai_banner-1280w.avif 1280w, /Sai_banner-1920w.avif 1920w"
      imagesizes="(min-width: 768px) 900px, 100vw"
      type="image/avif"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      if (localStorage.getItem("theme") !== "light") {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>
  <body>
    <!-- If you're reading this, you're our kind of engineer -->
    <div id="root">
      <div
        id="initial-loader"
        style="
          position: fixed;
          inset: 0;
          z-index: 200;
          display: flex;
          flex-direction: column;
          background: #191919;
        "
      >
        <div
          style="
            height: 2px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
          "
        >
          <div
            id="initial-loader-bar"
            style="
              height: 100%;
              width: 0%;
              background: rgba(16, 185, 129, 0.9);
              transition: width 200ms ease-out;
            "
          ></div>
        </div>
      </div>
      <style>
        html:not(.dark) #initial-loader {
          background: #f6f1e6;
        }
        html:not(.dark) #initial-loader div:first-child {
          background: rgba(61, 57, 47, 0.12);
        }
      </style>
      <script>
        (function () {
          // Repeat visitors: the React loader will be a no-op (see
          // NotionLoader.hasSeenLoader), so don't bother animating the
          // inline bar — leave the loader painted in the background and
          // let React replace it as soon as it mounts.
          try {
            if (localStorage.getItem("portfolio-loaded") === "1") return;
          } catch (e) {
            /* private mode — fall through to the animation */
          }
          var bar = document.getElementById("initial-loader-bar");
          if (!bar) return;
          var p = 0;
          var id = setInterval(function () {
            p = Math.min(88, p + Math.random() * 12);
            bar.style.width = p + "%";
            if (p >= 88) clearInterval(id);
          }, 180);
        })();
      </script>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
