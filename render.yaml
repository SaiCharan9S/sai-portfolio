# Render Web Service — API only
# Frontend is hosted separately on Vercel.

services:
  - type: web
    name: sai-portfolio-api
    runtime: node
    plan: free
    buildCommand: npm install --prefix server
    startCommand: npm start --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:5173,https://sksahilparvez.vercel.app
