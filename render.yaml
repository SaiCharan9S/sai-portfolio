# Single Render Web Service — serves API + Vite frontend from one Node app
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: sksahilparvez-notion
    runtime: node
    buildCommand: npm install --include=dev && npm run build && npm install --prefix server --omit=dev
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: VITE_GITHUB_TOKEN
        sync: false
